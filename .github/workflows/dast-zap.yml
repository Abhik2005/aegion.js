name: "OWASP ZAP DAST Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the application
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Start Server in Background
        run: |
          # Create a dummy server script to run the built library
          echo "import { Server } from './dist/server.js'; const app = new Server(); app.start();" > start.js
          node start.js &
          sleep 5 # Wait for server to boot

      - name: Fix Workspace Permissions for Docker
        run: chmod -R 777 .

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          cmd_options: '-a'
          artifact_name: 'zapresults'
